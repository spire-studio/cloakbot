id: customer_service_account_lockout_v1
domain: customer_service
density: dense
language: en
description: >
  Customer in a live chat with a SaaS support agent about a suspected
  account compromise. Carries quasi-identifiers (username + IP + login
  time) on top of standard PII, which is the typical real-world failure
  mode for naive privacy filters: each individual datum looks innocuous
  but the combination identifies a single person.

slots:
  customer:
    type: PERSON
    faker: name
  username:
    type: ID
    faker: user_name
  email:
    type: EMAIL
    faker: email
  phone_last4:
    type: ID
    faker: bothify
    args: {text: "####"}
  alt_phone:
    type: PHONE
    faker: phone_number
  address:
    type: ADDRESS
    faker: address
  home_ip:
    type: IP
    faker: ipv4
  account_id:
    type: ID
    faker: bothify
    args: {text: "U-########"}
  ticket_id:
    type: ID
    faker: bothify
    args: {text: "T-######"}
  alert_time:
    type: DATE
    faker: date_time_this_month
    format: "%B %-d at %-I:%M %p"
  callback_time:
    type: DATE
    faker: date_time_between
    args: {start_date: "+1d", end_date: "+3d"}
    format: "%A at %-I:%M %p"

turns:
  - role: user
    text: >-
      My login isn't working. Username is {username}, email on the account
      is {email}. I've been locked out twice in the last hour.
  - role: assistant
    text: >-
      I can help. Before I look at the account, can I confirm the name on
      file and the last four of your phone number?
  - role: user
    text: >-
      Name is {customer}, phone last four {phone_last4}. I think someone
      tried to break in — I got an alert at {alert_time}.
  - role: assistant
    text: >-
      I see the failed attempts on account {account_id}. Where do you
      normally sign in from?
  - role: user
    text: >-
      From home — {address}, IP is usually {home_ip}. The attempts I'm
      seeing came from somewhere else. Can you tell me where?
  - role: assistant
    text: >-
      I'll need to escalate this to our security team. I've opened ticket
      {ticket_id}. When's a good time to call you back?
  - role: user
    text: >-
      {callback_time} works. Use my alternate number {alt_phone} — my main
      phone is the one I'm using to access this chat, and I don't want to
      tie it up.
