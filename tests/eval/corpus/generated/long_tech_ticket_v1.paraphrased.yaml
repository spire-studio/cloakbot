    text: 'INCIDENT REPORT — {ticket_id} — {customer_company}


      Purpose of this note: provide a concise but complete operational packet for
      the current production failure, suitable for paging, incident review, and customer
      communications. The record below is intentionally written to support both engineering
      triage and account management follow-through. All contact details, environment
      identifiers, and escalation points are preserved in-line so that the on-call
      thread can be actioned without requiring a second source of truth.


      CUSTOMER CONTACT BLOCK: primary technical contact is {customer_contact} ({customer_email},
