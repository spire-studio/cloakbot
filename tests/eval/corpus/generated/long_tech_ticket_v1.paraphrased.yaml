      NEXT STEPS REQUESTED: please confirm an ETA for isolation pull of {primary_host},
      a fleet-wide audit for any other sidecars exhibiting the same {error_code} signature,
      and a written postmortem within five business days of resolution.


      The desired outcome is straightforward: isolate the host, compare for matching
      signatures across the fleet, and document the root cause and remediation in
      a postmortem once the incident closes. If the host isolation removes the symptom,
      please note the exact timing of recovery and whether any additional service
      mesh anomalies remain visible. End of report.'
