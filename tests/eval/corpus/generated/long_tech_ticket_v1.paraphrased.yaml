      facts needed by the engineer on call with the customer references needed by
      support, account management, and any later postmortem reviewer. The customer
      has described the issue as a high-severity production failure, and the requested
      handling is consistent with an active P0: fast page, quick isolation decision,
      clear ownership, and no ambiguity about the communications path.


      CUSTOMER CONTACT BLOCK: primary technical contact is {customer_contact} ({customer_email},
