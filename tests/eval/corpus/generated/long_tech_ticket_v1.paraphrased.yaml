      Please keep the response chain tight: page the current on-call, record the incident
      ID in the message, and ensure the customer-facing thread remains with {support_engineer}.
      If the initial page does not receive acknowledgment, the escalation should move
      to the next owner of the {environment} rotation rather than branching into ad
      hoc reassignment. That prevents duplicated triage and ensures the incident thread
