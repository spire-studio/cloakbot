      RMAs is {customer_address}. ACCOUNT: {account_id} (enterprise tier, named account).
      ASSIGNED SUPPORT: {support_engineer}, reachable directly at {support_engineer_email}.


      The customer asks that all updates continue to flow through the technical contact
      first, with billing and logistics references retained in case the mitigation
      path requires hardware replacement or shipment coordination. Although the present
      problem is not yet confirmed to involve physical equipment, the customer’s record
      of address and billing ownership is needed because the account is managed as
      a named enterprise relationship, and any remediation that crosses into hardware
      swap territory must not introduce delay later in the incident.


      SUMMARY: at {incident_start}, {customer_contact} reported that a sustained majority
      of API traffic into their {environment} deployment was returning {error_code}
