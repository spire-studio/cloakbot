      team should be called out by name for their persistence, especially given the
      competitive context and the fact that {new_hire} was balancing three separate
      offers from peer companies before deciding to move forward with us. BACKGROUND
      ON THE HIRE: {new_hire} joins us from {previous_employer}, where they led a
      platform organization spanning identity, data plane, and developer tooling across
      multiple teams. Their work there has been a strong outside benchmark for scaling
