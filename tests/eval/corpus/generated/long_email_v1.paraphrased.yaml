      were consistently favorable, with repeated comments on technical depth, sound
      judgment, and the ability to maintain a high engineering bar without exhausting
      the organization around them. COMPENSATION PACKAGE: The offer package, which
      finance has already booked against the FY plan, comprises a base salary of {base_salary},
