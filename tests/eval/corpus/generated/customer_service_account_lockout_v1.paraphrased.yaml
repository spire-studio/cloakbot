template_id: customer_service_account_lockout_v1
variants:
- id: customer_service_account_lockout_v1_p00
  turns:
  - role: user
    text: I can't get into my account. The username is {username} and the email attached
      is {email}. I've already been locked out twice within the past hour.
  - role: assistant
    text: I can check that, but first I need to verify you. What name is listed on
      the account, and what are the last four digits of your phone number?
  - role: user
    text: The name is {customer}, and the last four are {phone_last4}. I also got
      a security alert at {alert_time}, so I'm worried someone may have tried to get
      in.
  - role: assistant
    text: I do see multiple failed sign-in attempts tied to account {account_id}.
      What location do you normally log in from?
  - role: user
    text: Usually from home at {address}, and the IP I normally use is {home_ip}.
      The attempts I'm seeing don't match that. Can you tell where they came from?
  - role: assistant
    text: Because this looks security-related, I need to send it to our security team.
      I've created ticket {ticket_id}. What time should we call you back?
  - role: user
    text: '{callback_time} is fine. Please use my alternate number, {alt_phone}. I''m
      using my main phone for this chat and don''t want it tied up.'
- id: customer_service_account_lockout_v1_p01
  turns:
  - role: user
    text: Locked out again. Username {username}, account email {email}. This is the
      second lockout in an hour, and I think something is wrong.
  - role: assistant
    text: I can assist, but I need to verify the account first. Please give me the
      name on file and the last four digits of the phone number we have listed.
  - role: user
    text: It's under {customer}; phone ends in {phone_last4}. I got an alert at {alert_time},
      which is why I think this may be an attempted break-in.
  - role: assistant
    text: Thanks. I'm seeing failed login activity on account {account_id}. Where
      do you usually sign in from when everything is normal?
  - role: user
    text: From my home connection, at {address}. The usual IP is {home_ip}. These
      recent attempts look like they're from another place, so can you tell me where?
  - role: assistant
    text: I can't disclose more until security reviews it, so I'll escalate this now.
      Ticket {ticket_id} has been opened. When would you like a callback?
  - role: user
    text: Call me at {callback_time}. Use {alt_phone} instead of my main phone, since
      that's the one I'm using for chat right now.
- id: customer_service_account_lockout_v1_p02
  turns:
  - role: user
    text: I need help with a login issue. My username is {username}, the account email
      is {email}, and I've been locked out twice over the last hour.
  - role: assistant
    text: 'Happy to help. Before I access anything, I need two details for verification:
      the name on the account and the last four digits of the phone number on file.'
  - role: user
    text: Sure — the account name is {customer}, and the phone ends in {phone_last4}.
      Also, an alert came in at {alert_time}, which makes me think these attempts
      were not mine.
  - role: assistant
    text: Understood. I can confirm failed sign-in attempts on account {account_id}.
      What is your normal sign-in location?
  - role: user
    text: 'Almost always from home: {address}. My usual IP is {home_ip}. The activity
      I noticed doesn''t line up with that, so I''d like to know the source if possible.'
  - role: assistant
    text: Given the suspicious activity, this needs to go to our security specialists.
      I've submitted escalation ticket {ticket_id}. What callback time should I note?
  - role: user
    text: Please set it for {callback_time}. Reach me on {alt_phone}; I don't want
      my primary phone occupied while I'm chatting here.
- id: customer_service_account_lockout_v1_p03
  turns:
  - role: user
    text: My login stopped working, and I think it may be a security issue. The username
      is {username}, the email is {email}, and I've had two lockouts in the last hour.
  - role: assistant
    text: 'I can take a look. First, verify the account for me: what''s the name on
      file, and what are the last four digits of the phone number?'
  - role: user
    text: '{customer}. Last four are {phone_last4}. I also received an alert at {alert_time},
      so this doesn''t seem like a normal login failure.'
  - role: assistant
    text: I found the failed access attempts on account {account_id}. Where do you
      normally sign in from?
  - role: user
    text: From home, at {address}, and my regular IP is {home_ip}. The attempts shown
      are from somewhere different. Are you able to tell me where they originated?
  - role: assistant
    text: This will need a security escalation. I've opened {ticket_id} for the security
      team. What's the best time for a callback?
  - role: user
    text: '{callback_time}. And please call {alt_phone}; I''m on my main phone while
      using this chat and would rather keep it free.'
- id: customer_service_account_lockout_v1_p04
  turns:
  - role: user
    text: Something's up with my account. I can't log in, username is {username},
      the email on it is {email}, and I've already been locked out twice this past
      hour.
  - role: assistant
    text: 'I can help with that. Before I review the account, I need to confirm a
      couple of details: the name on file and the last four digits of your phone number.'
  - role: user
    text: Name on the account is {customer}, and the phone last four are {phone_last4}.
      I got an alert at {alert_time}, and that's why I suspect somebody else was trying
      to access it.
  - role: assistant
    text: I am seeing failed attempts associated with account {account_id}. Where
      do you ordinarily sign in from?
  - role: user
    text: Normally from my home address, {address}, using IP {home_ip}. The failed
      attempts don't appear to be from there. Can you tell me the other location?
  - role: assistant
    text: I'll escalate this to our security team for review. I've logged ticket {ticket_id}.
      What callback time should I put down?
  - role: user
    text: '{callback_time} works. Call the alternate number {alt_phone}; my main phone
      is busy because I''m using it for this chat.'
