template_id: medical_followup_v1
variants:
- id: medical_followup_v1_p00
  turns:
  - role: user
    text: I need to arrange a follow-up for my mother, {patient}. Her birth date is
      {dob}. She saw Dr. {doctor} last month about {diagnosis} and was started on
      {medication}.
  - role: assistant
    text: I found {patient}'s chart. Before I set anything up, could you verify the
      contact information we should use?
  - role: user
    text: Of course. The best phone number is {phone}, and the mailing address changed
      to {address}. Her BlueCross member ID is {insurance_id}.
  - role: assistant
    text: Thanks, that's updated. I also see an unpaid {copay} copay from {patient}'s
      last visit with Dr. {doctor}. Do you want that included in the new appointment
      confirmation email?
  - role: user
    text: Yes, include it. And please book her specifically with Dr. {doctor}; she
      gets nervous seeing someone new and is most comfortable with him.
- id: medical_followup_v1_p01
  turns:
  - role: user
    text: Hello. I'm trying to book my mother, {patient}, for a follow-up. She was
      born {dob}, saw Dr. {doctor} last month for {diagnosis}, and he's had her taking
      {medication} since then.
  - role: assistant
    text: I can help with that. I do have {patient} in the system, but first I'd like
      to confirm the contact details we have on record.
  - role: user
    text: No problem — use {phone} for the phone number. Her mailing address is now
      {address}, since we moved, and the BlueCross ID is {insurance_id}.
  - role: assistant
    text: Perfect. I should also mention there's still a {copay} balance from {patient}'s
      prior appointment with Dr. {doctor}. Would you like that noted in the confirmation
      email for the new visit?
  - role: user
    text: Yes, please add that. Also, it needs to be with Dr. {doctor} again — she
      really trusts him and gets anxious if it's a different provider.
- id: medical_followup_v1_p02
  turns:
