- id: medical_followup_v1_p04
  turns:
  - role: user
    text: I'm calling about my mother, {patient}. I'd like a follow-up scheduled.
      She was born {dob}, and after seeing Dr. {doctor} last month for {diagnosis},
      she was prescribed {medication}.
  - role: assistant
    text: Understood. I have {patient}'s record open. Before I book the visit, would
