template_id: hr_candidate_intake_v1
variants:
- id: hr_candidate_intake_v1_p00
  turns:
  - role: user
    text: Hello, I'm {candidate}. I'm following up on the senior engineering position
      I applied to last week. My contact details are {phone} and {email}, and I believe
      my first conversation was with {recruiter}.
  - role: assistant
    text: Hi {candidate} — yes, I see your application here. I just need to verify
      a few details about your current situation before we continue.
  - role: user
    text: Of course. I'm with {current_employer} now, started on {start_date}, and
      my current base salary is {current_salary}. For a new role, I'm looking for
      about {expected_salary} plus equity.
  - role: assistant
    text: That helps, thank you. What was your employer before {current_employer}?
  - role: user
    text: Before this, I was at {prev_employer} through {prev_end_date}. Also, {reference_colleague}
      from that team is happy to serve as a reference, and their LinkedIn is linkedin.com/in/{linkedin}.
  - role: assistant
    text: 'Great. One final step: I need your current address for the offer paperwork
      and the last four digits of your SSN to initiate the background check.'
  - role: user
    text: Sure — my address is {address}, and the last four are {ssn_last4}. Is there
      anything else you need to move me into the next round?
