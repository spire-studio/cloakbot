      correspondence is sent on behalf of {client_name} and is intended solely for
      the addressee, {recipient_attorney} at {recipient_firm}. The contents reflect
      privileged settlement communications protected by the applicable evidentiary
      rules and the mediation privilege of {incident_location}. The counter-offer
