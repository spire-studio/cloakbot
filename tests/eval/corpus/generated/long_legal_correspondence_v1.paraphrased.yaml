      {recipient_firm}, represents {opposing_party}. This is the firm’s first written
      communication to your office since the parties’ initial Rule 26(f) conference,
      and it supersedes any informal authority that may have been exchanged between
      counsel previously. PROCEDURAL POSTURE: The matter was filed by your client
      {opposing_party} in {incident_location} on {filing_date} and arises from the
      events of {incident_date}. The court has placed the case on a routine scheduling
      track, dispositive motions remain calendared as already established by the court,
      and your office has served a written demand for relief in the amount of {prior_demand_amount},
      together with pre-judgment interest, costs, and reasonable attorneys’ fees.
      We are now far enough into written discovery that the dispute is clear in outline,
      and we write to answer that demand and to propose a route to resolution without
      additional motion practice. RESPONSE TO DAMAGES: {client_name} continues to
      dispute, entirely, both the narrative of the events of {incident_date} set out
      in {opposing_party}’s first amended complaint and the method used to calculate
      your client’s claimed damages. Our internal forensic accountants and two outside
      consultants have independently reviewed the loss computations advanced in your
      letter and have concluded that the {prior_demand_amount} amount rests on at
      least three distinct multipliers, each unsupported on the present record and
      at least one of which appears to duplicate losses already conceded to be unrecoverable
      under the master services agreement at issue. Even under the most plaintiff-friendly
      reading of that agreement, our analysis indicates the recoverable measure could
      not exceed roughly one-third of the {prior_demand_amount} amount your office
      has asserted. We are prepared, if necessary, to present our experts and walk
      the trier of fact through each multiplier and the record evidence that undercuts
      it. We do not believe that serves either side well at this stage. COUNTER-OFFER:
      Notwithstanding the foregoing, and solely in the interest of avoiding the time,
