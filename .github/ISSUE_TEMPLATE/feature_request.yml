name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Cloakbot is built around a single conviction: privacy tooling should be
        trustworthy, transparent, and approachable. Please frame proposals in that light.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-facing problem first, not a pre-chosen solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you discarded them.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy impact
      options:
        - label: This proposal could affect what data leaves the device or the remote trust boundary
        - label: I have read the privacy boundaries in AGENTS.md
