# Source of truth for repository labels.
# Synced by .github/workflows/label-sync.yml (EndBug/label-sync).
# delete-other-labels is FALSE — labels not listed here are NEVER removed.

# --- Kind (GitHub defaults, kept & standardized) ---
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: "question"
  color: "d876e3"
  description: "Further information is requested (prefer Discussions)"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"
- name: "invalid"
  color: "e4e669"
  description: "This doesn't seem right"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"

# --- Community ---
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

# --- Area (auto-applied by path via .github/labeler.yml) ---
- name: "area: privacy"
  color: "0e8a16"
  description: "Privacy pipeline / trust boundary"
- name: "area: security"
  color: "0e8a16"
  description: "Security-sensitive code"
- name: "area: channels"
  color: "0e8a16"
  description: "Messaging channel integrations"
- name: "area: providers"
  color: "0e8a16"
  description: "LLM provider / inference backends"
- name: "area: agent"
  color: "0e8a16"
  description: "Agent core / orchestration"
- name: "area: cli"
  color: "0e8a16"
  description: "CLI and commands"
- name: "area: api"
  color: "0e8a16"
  description: "HTTP / OpenAI-compatible API"
- name: "area: webui"
  color: "0e8a16"
  description: "Web UI"
- name: "area: bridge"
  color: "0e8a16"
  description: "Node bridge"
- name: "area: docs"
  color: "0e8a16"
  description: "Documentation files"
- name: "area: build"
  color: "0e8a16"
  description: "CI, Docker, packaging, dependencies config"

# --- Flags ---
- name: "breaking change"
  color: "b60205"
  description: "Backwards-incompatible change; needs a SemVer major/minor bump"
- name: "security"
  color: "d93f0b"
  description: "Security concern (do not post vulnerability details publicly)"
- name: "dependencies"
  color: "0366d6"
  description: "Dependency updates (auto-applied by Dependabot)"

# --- Status ---
- name: "status: needs-triage"
  color: "fbca04"
  description: "Awaiting maintainer triage"
- name: "status: blocked"
  color: "b60205"
  description: "Blocked on another change or external dependency"
