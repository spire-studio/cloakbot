name: PR labeler

# Auto-apply "area: *" labels to PRs based on the files they touch.
# Rules live in .github/labeler.yml.

on:
  pull_request_target:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          # Remove an area label again if the PR stops touching those files.
          sync-labels: true
