name: Release

# Cut a release by pushing a tag from main whose name is "v" + the pyproject
# version (PEP 440). For the privacy-kernel beta:
#   git tag v0.2.1b1 && git push origin v0.2.1b1
# The tag must equal "v" + the pyproject.toml version (the job fails otherwise).
# Pre-release tags (aN/bN/rcN) are published as GitHub pre-releases automatically.

# Force JavaScript-based actions (checkout / gh-release) to run on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Verify tag matches pyproject version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT="$(uv version --short 2>/dev/null || grep -m1 '^version' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$TAG project=$PROJECT"
          if [ "$TAG" != "$PROJECT" ]; then
            echo "::error::Tag v$TAG does not match pyproject.toml version $PROJECT"
            exit 1
          fi

      # The compiled WebUI (Vite outDir = cloakbot/web/dist) is git-ignored and
      # pulled into the wheel via [tool.hatch.build].artifacts, so it MUST exist
      # on disk before `uv build` — otherwise the published package ships no UI.
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Build the WebUI
        run: npm ci && npm run build
        working-directory: webui

      - name: Build sdist and wheel
        run: uv build

      - name: Upload distributions for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # aN/bN/rcN tags (PEP 440 pre-releases) -> mark the Release as pre-release.
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          # Only the real artifacts — `dist/*` also matches uv's dist/.gitignore,
          # which GitHub uploads as a stray `default.gitignore` asset.
          files: |
            dist/*.whl
            dist/*.tar.gz

  # Publish to PyPI via Trusted Publishing (OIDC — no API token or secret needed).
  # This publishes the SAME artifacts built above (including the bundled WebUI);
  # it never rebuilds, so the PyPI wheel is byte-identical to the GitHub Release.
  #
  # One-time setup (both required before the first tag, or this job fails):
  #   1. PyPI -> https://pypi.org/manage/account/publishing/ -> "Add a pending
  #      publisher": project name "cloakbot", owner "spire-studio",
  #      repository "cloakbot", workflow "release.yml", environment "pypi".
  #   2. GitHub -> repo Settings -> Environments -> create an environment "pypi".
  publish-pypi:
    needs: build-and-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cloakbot
    permissions:
      id-token: write  # mint the OIDC token PyPI exchanges for an upload token
    steps:
      - name: Download the distributions built above
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
